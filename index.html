<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Premium wedding invitation cover for Parathvaj and Moni.">
  <title>Parathvaj & Moni | Open Invitation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-opening">
  <div class="page-shell">
    <div class="ambient ambient-rose"></div>
    <div class="ambient ambient-cream"></div>
    <div class="grain"></div>
    <div class="petal-field" id="petalField" aria-hidden="true"></div>

    <main class="opening-stage">
      <div class="curtain curtain-left"></div>
      <div class="curtain curtain-right"></div>
      <div class="spotlight"></div>

      <section class="opening-card reveal reveal-immediate">
        <p class="mini-label">Wedding Invitation</p>
        <p class="script-line">You Are Invited</p>
        <h1 class="opening-title" data-couple-html><span class="name-line">Bharath&nbsp;Kumar</span><span class="heart-line">&hearts;</span><span class="name-line">Moni</span></h1>
        <p class="opening-copy" data-opening-message>
          With joyful hearts and the blessings of our families, we invite you to celebrate our wedding.
        </p>
        <div class="opening-meta">
          <span class="meta-chip" data-wedding-date-long>Sunday, 22 November 2026</span>
          <span class="meta-chip" data-venue-name>Your Wedding Venue</span>
        </div>
        <a class="button button-primary opening-button" href="welcome.html">Open Invitation</a>
        <p class="tap-note">Tap to begin the celebration</p>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
